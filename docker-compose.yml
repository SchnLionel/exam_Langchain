version: "3.8"

services:

  # Service 1 : API d'authentification (port 8001)
  auth:
    build:
      context: ./src/api/authentification
      dockerfile: Dockerfile.auth
    ports:
      - "8001:8001"
    env_file:
      - .env

  # Service 2 : API principale (port 8000)
  main:
    build:
      context: ./src
      dockerfile: api/assistant/Dockerfile.main
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - AUTH_SERVICE_URL=http://auth:8001
    depends_on:
      - auth

  # Service 3 : Interface Streamlit (port 8501) - optionnel
  streamlit:
    build:
      context: ./src
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - auth
      - main